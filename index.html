<!doctype html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0f1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    
    <!-- SEO_TAGS_PLACEHOLDER -->
    
    <link rel="stylesheet" href="/fonts/fonts.css" />
    <link rel="stylesheet" href="/custom.css" />
    <script src="https://telegram.org/js/telegram-web-app.js" async></script>
    <style>
      body {
        background-color: #0a0f1a;
      }
    </style>
    <meta name="description" content="">
  <meta property="og:title" content="">
  <meta property="og:description" content="">
  <meta name="title" content="">
  <meta property="twitter:title" content="">
  <meta property="twitter:description" content="">
  <meta property="og:image" content="/og-image.webp">
  <meta property="twitter:image" content="/og-image.webp">
  <script>
    // SEO: подтягиваем мета-теги из БД через API (работает на ЛЮБОЙ странице, включая /login)
    (function(){
      var api = '/api/seo/current';
      fetch(api).then(function(r){ return r.ok ? r.json() : null; }).then(function(d){
        if(!d) return;
        function s(q,v){ if(!v) return; var e=document.querySelector(q); if(e) e.setAttribute('content',v); }
        s('meta[name="title"]',d.title);
        s('meta[property="og:title"]',d.title);
        s('meta[property="twitter:title"]',d.title);
        s('meta[name="description"]',d.description);
        s('meta[property="og:description"]',d.description);
        s('meta[property="twitter:description"]',d.description);
        if(d.og_image_url){ s('meta[property="og:image"]',d.og_image_url); s('meta[property="twitter:image"]',d.og_image_url); }
        if(d.title) document.title = d.title;
      }).catch(function(){});
    })();
  </script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
