      />

    <script>
      // Load Telegram Web App script only inside Telegram environment
      (function() {
        var isTelegram = window.TelegramWebviewProxy ||
          location.hash.indexOf('tgWebApp') !== -1 ||
          location.search.indexOf('tgWebApp') !== -1;
        if (isTelegram) {
          var s = document.createElement('script');
          s.src = 'https://telegram.org/js/telegram-web-app.js';
          s.async = true;
          document.head.appendChild(s);
        }
      })();
    </script>
    <style>
      body {
        background-color: #0a0f1a;
      }
    </style>
    <meta name="description" content="Управление доступом, подписками и цифровыми ресурсами в одном месте.">
  <meta property="og:title" content="Freedom - Твой личный кабинет">
  <meta property="og:description" content="Управление доступом, подписками и цифровыми ресурсами в одном месте.">
  <meta name="title" content="Freedom - Твой личный кабинет">
  <meta property="twitter:title" content="Freedom - Твой личный кабинет">
  <meta property="twitter:description" content="Управление доступом, подписками и цифровыми ресурсами в одном месте.">
  <meta property="og:image" content="/og-image.webp">
  <meta property="twitter:image" content="/og-image.webp">
  <script>
    // SEO: подтягиваем мета-теги из БД (только на боевом сервере, НЕ на localhost)
    (function(){
      var h = location.hostname;
      if(h === 'localhost' || h === '127.0.0.1') return;
      var api = '/api/seo/current';
      fetch(api).then(function(r){ return r.ok ? r.json() : null; }).then(function(d){
        if(!d) return;
        function s(q,v){ if(!v) return; var e=document.querySelector(q); if(e) e.setAttribute('content',v); }
        s('meta[name="title"]',d.title);
        s('meta[property="og:title"]',d.title);
        s('meta[property="twitter:title"]',d.title);
        s('meta[name="description"]',d.description);
        s('meta[property="og:description"]',d.description);
        s('meta[property="twitter:description"]',d.description);
        if(d.og_image_url){ s('meta[property="og:image"]',d.og_image_url); s('meta[property="twitter:image"]',d.og_image_url); }
        if(d.title) document.title = d.title;
      }).catch(function(){});
    })();
  </script>
</head>
  <body>
    <div id="root"></div>
